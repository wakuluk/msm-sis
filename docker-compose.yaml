  msm-sis-frontend-mantine:
    build:
      context: ./frontend-mantine
    ports:
      - "5173:5173"
    volumes:
      - ./frontend-mantine:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_PROXY_TARGET: "http://msm-sis-api:8080"
#
