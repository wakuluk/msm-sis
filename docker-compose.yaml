#      - /app/node_modules
#    environment:
#      CHOKIDAR_USEPOLLING: "true"
#      VITE_PROXY_TARGET: "http://msm-sis-api:8080"


  msm-sis-api:
    build:
      context: ./api
    ports:
      - "8081:8080"
      - "5005:5005"
    depends_on:
      msm-sis-db:
        condition: service_healthy
    volumes:
      - ./msm-sis-file-share:/app/files
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://msm-sis-db:3306/msmsisdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: msmsisdb
      APP_STORAGE_ROOT_DIR: /app/files
      APP_CORS_ALLOWED_ORIGIN: http://localhost:5173
      JAVA_OPTS: ${JAVA_OPTS:-}

volumes:
  msm_sis_db_data:
  #Change this to the volume share for msm-sis-api volume later.c
  msm_sis_files:
