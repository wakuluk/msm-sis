services:
  msm-sis-db:
    image: mysql:8.4
    restart: unless-stopped
    command: --sql_mode=""
    environment:
      MYSQL_ROOT_PASSWORD: msmsisdb
      MYSQL_DATABASE: msmsisdb
    ports:
      - "3307:3306"
    volumes:
      - msm_sis_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pmsmsisdb"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 8s

