spring:
  datasource:
    url: jdbc:mysql://localhost:3307/msmsisdb
    username: root
    password: msmsisdb
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/testdata

app:
  storage:
    root-dir: ./uploads
