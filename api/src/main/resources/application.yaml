spring:
  application:
    name: msm-sis-api

  datasource:
    url: jdbc:mysql://msm-sis-db:3306/msmsisdb
    username: root
    password: msmsisdb
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
app:
  cors:
    all
  security:
    jwt:
      secret: ${APP_JWT_SECRET:change-me-to-a-long-random-development-secret-at-least-32-bytes}
      expiration-seconds: ${APP_JWT_EXPIRATION_SECONDS:3600}
  storage:
    root-dir: ${APP_STORAGE_ROOT_DIR:./uploads}

server:
  port: 8080
